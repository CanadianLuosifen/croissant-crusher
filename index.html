<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    @author Anthony Wasilkoff
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Crusher</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="js/croissant-crusher.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<header>
    <h1>Optimized Croissant Crusher</h1>
</header>
<body>
    <div>
        <span>Money: $</span><span id="money">0</span>
    </div>
    <div class="d-flex justify-content-center">
        <svg id="game-area" width="900" height="500" xmlns="http://www.w3.org/2000/svg" onmousemove="mouseMove(event)" viewBox="0 0 900 500">
            <g id="game-offset" width="900" height="500">
                <image width="256" height="500" href="assets/crusher.png"></image>
                <rect id="crush-area" x="32" y="380" width="128" height="70" fill="none"></rect>
                <image id="lever-mount" x="170" y="235" width="75" height="120" href="assets/lever-mount.png"></image>
                <image id="lever-shaft" x="170" y="250" width="75" height="35" href="assets/lever-shaft.png" preserveAspectRatio="none"></image>
                <image id="lever-head" x="170" y="250" vy="0" vx="0" width="75" height="20" href="assets/lever-head.png"></image>
                <image id="chute" x="732"  width="168" height="120" href="assets/funnel.png"></image>
                <image id="buy-croissant" x="766" y="2" width="100" height="40" href="assets/buy.png" onmouseup="createCroissant()"></image>
                <image id="press-head" x="32" y="150" width="128" height="50" href="assets/press-head.png"></image>
                <image id="press-shaft" x="32" y="0" width="128" height="150" href="assets/press-shaft.png" preserveAspectRatio="none"></image>
                <image id="press-shaft-cover" x="32" y="0" width="128" height="75" href="assets/press-shaft-cover.png" preserveAspectRatio="none"></image>
            </g>
        </svg>
    </div>
</body>
<footer class="text-center">
    <h3>&copy; Anthony Wasilkoff 2026</h3>
</footer>
</html>
